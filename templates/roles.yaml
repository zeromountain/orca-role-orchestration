# Orca multi-model role orchestration
# MANAGED FILE — overwritten on every install re-run.
# User customization: edit project_hints.yaml (never roles.yaml).
# Personas live in personas/<role>.md (bootstrap seeds; dispatch uses STANCE).
# agent/model fields document defaults; launch lives in orca-bootstrap-roles.sh.

version: 1
worktree: active

roles:
  coordinator:
    description: >
      Decompose work into a DAG, route by role, dispatch, wait on
      worker_done/escalation, synthesize. Does not implement bulk code.
    agent: any
    model: any
    persona_file: personas/coordinator.md
    persona_summary: >-
      The Conductor — decompose into a DAG, route by model strength, dispatch,
      synthesize; never bulk-implement.
    owns:
      - task DAG design
      - decision gates
      - merge synthesis
      - escalation handling
    does_not:
      - large multi-file implementation (delegate)
      - bulk ticket grind (delegate)

  architect:
    handle_title: role-opus-architect
    agent: claude
    model: claude-opus-4-8
    effort: high
    persona_file: personas/architect.md
    persona_summary: >-
      The Strategist — plan, judge, and review high-stakes work with evidence;
      delegate bulk implementation; push back on weak plans.
    owns:
      - architecture / design
      - ambiguous requirements
      - multi-package / multi-service plans
      - PR / security / privacy / correctness review
      - long-horizon autonomous work when correctness > cost
    route_keywords:
      - architecture
      - design
      - plan
      - review
      - audit
      - security
      - privacy
      - migration
      - multi-service
      - judgment
      - decision

  executor:
    handle_title: role-sol-executor
    agent: codex
    model: gpt-5.6-sol
    effort: high
    persona_file: personas/executor.md
    persona_summary: >-
      The Closer — implement the approved plan end-to-end, verify before
      claiming done, integrate; escalate ambiguity to architect.
    owns:
      - hard multi-step implementation from an approved plan
      - terminal-heavy debug / fix loops
      - tests, typecheck, build verification
      - PR-sized end-to-end delivery
      - raster image generation and edit via Codex $imagegen skill
    route_keywords:
      - implement
      - implement hard
      - terminal
      - debug
      - reproduce
      - typecheck
      - build
      - test
      - codex
      - integrate
      - verify
      - ultra
      - image
      - imagegen
      - generate image
      - edit image
      - mockup
      - illustration
      - sprite
      - hero image
      - product shot
      - 이미지
      - 이미지 생성
      - 이미지 편집
      - 목업
      - 일러스트
      - 스프라이트

  thrifty:
    handle_title: role-grok-thrifty
    agent: grok
    model: grok-4.5
    effort: default
    persona_file: personas/thrifty.md
    persona_summary: >-
      The Scout — fast, cheap small/exploratory work; small diffs; cite
      sources; escalate design risk early.
    owns:
      - well-scoped tickets and small diffs
      - codebase search / navigation / mechanical renames
      - prototypes and throwaway demos
      - external research and alternative generation
      - docs polish, high-volume low-risk codegen
    route_keywords:
      - small fix
      - rename
      - docs
      - prototype
      - research
      - alternatives
      - volume
      - cheap
      - navigate
      - map code
      - explore

  fallback:
    handle_title: role-agy-fallback
    agent: antigravity
    cli: agy
    model: "Gemini 3.5 Flash (Medium)"
    effort: medium
    persona_file: personas/fallback.md
    persona_summary: >-
      The Relief Pitcher — enter only on a primary's limit; smallest viable
      progress; stabilize and hand back; never re-architect.
    owns:
      - continue work when primaries are rate/session limited
      - low-to-medium complexity fixes while primaries cool down
    route_keywords:
      - rate limit
      - session limit
      - overloaded
      - quota
      - fallback
      - agy
      - antigravity
    triggers_on:
      - "You've hit your session limit"
      - "rate limit"
      - "usage limit"
      - "overloaded"
      - "quota exceeded"
      - "try again later"
      - "429"
    notes: |
      Cross-provider failover is orchestration-level (redispatch ROLE=fallback).
      Claude --fallback-model only supports Anthropic models.

routing_table:
  - match: architecture_or_plan
    when: "New feature design, ambiguous requirements, multi-package impact"
    primary: architect
  - match: high_risk_review
    when: "auth, PII, security, migrations, privacy, high-stakes ship"
    primary: architect
    secondary: executor
  - match: hard_implementation
    when: "Approved plan, multi-file non-trivial code, tool-heavy debug"
    primary: executor
    secondary: thrifty
  - match: terminal_agent_loop
    when: "Shell-heavy repro, multi-step CLI workflow"
    primary: executor
  - match: image_generation
    when: >
      User wants a new or edited raster image (hero, mockup, illustration,
      sprite, product shot, transparent cutout, etc.). Not SVG/vector/code-native icons.
    primary: executor
    notes: |
      Coordinator clarity gate BEFORE dispatch:
      enough brief = subject + intended use (+ style/destination if project-bound).
      If missing critical slots → ask user; do not dispatch.
      Spec MUST require Codex $imagegen skill only
      (${CODEX_HOME:-$HOME/.codex}/skills/.system/imagegen/SKILL.md).
      Do not route to thrifty/Grok image tools.
  - match: small_ticket
    when: "Clear 1-3 file change, docs polish, rename"
    primary: thrifty
  - match: codebase_map
    when: "Find where X lives (read-only)"
    primary: thrifty
  - match: research_or_alternatives
    when: "External research, competitor/platform alternatives"
    primary: thrifty
    secondary: architect
  - match: prototype
    when: "Spike / demo / one-shot mock (code/UI, not raster image generation)"
    primary: thrifty
    secondary: architect
  - match: verification
    when: "typecheck, build, test, integrate"
    primary: executor
  - match: dual_review
    when: "High stakes ship gate"
    primary: architect
    secondary: executor

dags:
  feature_plan_execute_review:
    description: Standard feature delivery
    steps:
      - id: plan
        role: architect
        deps: []
        spec_template: |
          ROLE=architect. Plan only for:
          {{user_goal}}
          Follow project AGENTS.md / CLAUDE.md constraints if present.
          Output: file list, risks, verification commands. No bulk implement unless trivial.
      - id: implement
        role: executor
        deps: [plan]
        spec_template: |
          ROLE=executor. Implement ONLY the approved plan:
          {{plan_result}}
          Stay in listed files. Run verification. Ask if blocked.
      - id: review
        role: architect
        deps: [implement]
        spec_template: |
          ROLE=architect (review-only). Check correctness, project constraints, security.
          Do NOT edit unless critical one-line fix. Report findings for coordinator.

  small_fix_fast:
    description: Low-risk quick fix
    steps:
      - id: fix
        role: thrifty
        deps: []
        spec_template: |
          ROLE=thrifty. Minimal fix for:
          {{user_goal}}
          Smallest diff. Lightest relevant verification.

  high_risk_change:
    description: Auth / PII / security / migration
    steps:
      - id: plan
        role: architect
        deps: []
      - id: implement
        role: executor
        deps: [plan]
      - id: dual_review
        role: architect
        deps: [implement]
      - id: verify
        role: executor
        deps: [dual_review]

  explore_then_build:
    description: Unknown area
    steps:
      - id: map
        role: thrifty
        deps: []
        spec_template: |
          ROLE=thrifty (read-only). Map {{topic}}. file:line table. No edits.
      - id: plan
        role: architect
        deps: [map]
      - id: implement
        role: thrifty
        deps: [plan]

  research_then_integrate:
    description: External research into project
    steps:
      - id: research
        role: thrifty
        deps: []
      - id: critique
        role: architect
        deps: [research]
      - id: integrate
        role: executor
        deps: [critique]

  image_generate:
    description: Raster image via Codex $imagegen (after brief is clear)
    steps:
      - id: generate
        role: executor
        deps: []
        spec_template: |
          ROLE=executor. Image task for {{PROJECT_NAME}}.
          Use Codex skill $imagegen ONLY
          (read ${CODEX_HOME:-$HOME/.codex}/skills/.system/imagegen/SKILL.md).
          Do NOT use other image APIs, Grok/Claude image tools, or invent scripts.

          Brief (already clarified with user):
          {{image_brief}}

          Rules:
          - Built-in image_gen path inside $imagegen by default
          - CLI fallback only if user explicitly confirmed
          - Project-bound assets: copy final file into workspace; report absolute path
          - Do not overwrite existing assets unless user asked to replace
          - If brief is still missing a success-critical detail → escalate/ask; do not invent

          Done: final path(s) + short prompt used + built-in vs CLI mode.

limit_failover:
  enabled: true
  target_role: fallback
  agent: antigravity
  model: "Gemini 3.5 Flash (Medium)"
  detect_patterns:
    # Mirrors scripts/orca-fallback-on-limit.sh LIMIT_RE (doc only; script is authoritative)
    - "session limit"
    - "rate limit"
    - "usage limit"
    - "overloaded"
    - "quota exceeded"
    - "try again later"
    - "429"
    - "hit your limit"
    - "capacity"
  policy: |
    1. Do not hammer the limited primary
    2. Create NEW task ROLE=fallback with goal + partial progress
    3. Dispatch --inject to role-agy-fallback
    4. Script: .orca/orchestration/scripts/orca-fallback-on-limit.sh --from <role> --spec "..."
  script: .orca/orchestration/scripts/orca-fallback-on-limit.sh

lifecycle:
  supervised_only_when:
    - user asks to supervise / monitor / wait / coordinate DAG / decision gate
  worker_done_required: true
  max_concurrent: 2
  wait_timeout_ms: 900000
  circuit_break_after_failures: 3
  edit_ownership: |
    One role edits a given file set at a time.
    Review-only architect must not rewrite executor/thrifty files unless re-dispatched.
  on_rate_limit: redispatch_to_fallback
  # Supervised role tabs are ephemeral: one live tab per in-flight dispatch,
  # closed on worker_done, recreated on the next dispatch (not long-lived warm pools).
  close_terminal_after_done: true   # prefer orca-wait-done.sh (auto-close --tab on worker_done)
  recreate_terminal_on_dispatch: true  # dispatch rebuilds a dead/missing role tab
  wait_script: .orca/orchestration/scripts/orca-wait-done.sh
